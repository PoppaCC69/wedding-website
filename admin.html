<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>C&L — RSVP Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cream:#FAF6EA;--blue:#5B7CAE;--blue-light:#B8D4E0;--grey:#F2F1EF;--grey-mid:#E0DED9;--charcoal:#2A2A2A;--mid:#5A5A5A;--light:#9A9A9A;--green:#4a9e6b;--red:#b05555;}
body{background:var(--grey);font-family:'Jost',sans-serif;color:var(--charcoal);}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);}
.login-box{text-align:center;max-width:360px;width:100%;padding:48px 32px;background:white;border:1px solid var(--grey-mid);}
.login-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:28px;color:var(--blue);margin-bottom:8px;}
.login-sub{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--light);margin-bottom:32px;}
.login-input{width:100%;padding:13px 15px;border:1px solid var(--grey-mid);font-family:'Jost',sans-serif;font-size:14px;outline:none;border-radius:6px;margin-bottom:16px;text-align:center;letter-spacing:.08em;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;background:var(--blue);color:white;border:none;padding:13px;font-family:'Jost',sans-serif;font-weight:400;font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:8px;}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* ADMIN */
#admin-screen{display:none;padding:32px 20px;max-width:1100px;margin:0 auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:gap;}
.admin-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:28px;color:var(--blue);}
.admin-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--light);margin-top:4px;}
.export-btn{background:var(--blue);color:white;border:none;padding:10px 24px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-radius:8px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:32px;}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:white;padding:20px;border:1px solid var(--grey-mid);text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500;color:var(--blue);}
.stat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--light);margin-top:4px;}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:8px 18px;border:1px solid var(--grey-mid);background:white;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:20px;transition:all .2s;}
.filter-btn.active{background:var(--blue);color:white;border-color:var(--blue);}

/* TABLE */
.table-wrap{background:white;border:1px solid var(--grey-mid);overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
th{font-family:'Jost',sans-serif;font-weight:500;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--light);padding:14px 16px;text-align:left;border-bottom:2px solid var(--grey-mid);background:var(--grey);}
td{padding:14px 16px;border-bottom:1px solid var(--grey-mid);font-size:13px;font-weight:300;color:var(--mid);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--grey);}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:400;}
.badge-day{background:rgba(91,124,174,.12);color:var(--blue);}
.badge-eve{background:rgba(42,42,42,.1);color:var(--charcoal);}
.badge-yes{background:rgba(74,158,107,.12);color:var(--green);}
.badge-no{background:rgba(176,85,85,.12);color:var(--red);}
.no-data{text-align:center;padding:48px;color:var(--light);font-style:italic;}
.loading{text-align:center;padding:48px;color:var(--light);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <p class="login-title">C &amp; L</p>
    <p class="login-sub">RSVP Admin</p>
    <input class="login-input" type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="login-btn" onclick="checkPw()">Enter</button>
    <p class="login-err" id="pw-err">Incorrect password — try again.</p>
  </div>
</div>

<div id="admin-screen">
  <div class="admin-header">
    <div>
      <p class="admin-title">Callum &amp; Livvy — RSVP Dashboard</p>
      <p class="admin-sub">30th April 2027 &nbsp;·&nbsp; The Organ Factory</p>
    </div>
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total Responses</div></div>
    <div class="stat-card"><div class="stat-num" id="s-attending">—</div><div class="stat-label">Attending</div></div>
    <div class="stat-card"><div class="stat-num" id="s-day">—</div><div class="stat-label">Day Guests</div></div>
    <div class="stat-card"><div class="stat-num" id="s-eve">—</div><div class="stat-label">Evening Guests</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterRsvps('all',this)">All</button>
    <button class="filter-btn" onclick="filterRsvps('day',this)">Day</button>
    <button class="filter-btn" onclick="filterRsvps('evening',this)">Evening</button>
    <button class="filter-btn" onclick="filterRsvps('attending',this)">Attending</button>
    <button class="filter-btn" onclick="filterRsvps('declined',this)">Declined</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Attending</th>
          <th>Dietary</th>
          <th>Allergies</th>
          <th>Song Request</th>
          <th>Day Two</th>
          <th>Note</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody id="rsvp-tbody">
        <tr><td colspan="9" class="loading">Loading responses…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL='https://rheetkmurbkfzghatznc.supabase.co';
const SUPABASE_KEY='sb_publishable__lthlX7vu4UDQ6Sv8DmPGw_olrAjtbM';
const ADMIN_PASSWORD='giddyup2027';
let allRsvps=[];

function checkPw(){
  const pw=document.getElementById('pw-input').value;
  if(pw===ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadRsvps();
  }else{
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-input').value='';
  }
}

async function loadRsvps(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/rsvps?select=*&order=created_at.desc',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    allRsvps=await res.json();
    updateStats();
    renderTable(allRsvps);
  }catch(e){
    document.getElementById('rsvp-tbody').innerHTML='<tr><td colspan="9" class="no-data">Error loading data — please refresh.</td></tr>';
  }
}

function updateStats(){
  const attending=allRsvps.filter(r=>r.attending==='yes');
  document.getElementById('s-total').textContent=allRsvps.length;
  document.getElementById('s-attending').textContent=attending.length;
  document.getElementById('s-day').textContent=attending.filter(r=>r.guest_type==='day').length;
  document.getElementById('s-eve').textContent=attending.filter(r=>r.guest_type==='evening').length;
}

function renderTable(data){
  const tbody=document.getElementById('rsvp-tbody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="9" class="no-data">No responses yet.</td></tr>';return;}
  tbody.innerHTML=data.map(r=>{
    const date=new Date(r.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    return `<tr>
      <td><strong style="font-weight:400;color:var(--charcoal)">${r.name||'—'}</strong></td>
      <td><span class="badge ${r.guest_type==='day'?'badge-day':'badge-eve'}">${r.guest_type||'—'}</span></td>
      <td><span class="badge ${r.attending==='yes'?'badge-yes':'badge-no'}">${r.attending==='yes'?'Yes':'No'}</span></td>
      <td>${r.dietary||'—'}</td>
      <td>${r.allergies||'—'}</td>
      <td>${r.song_request||'—'}</td>
      <td>${r.day_two||'—'}</td>
      <td style="max-width:180px;word-wrap:break-word;">${r.note_to_couple||'—'}</td>
      <td style="white-space:nowrap">${date}</td>
    </tr>`;
  }).join('');
}

function filterRsvps(type,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let filtered=allRsvps;
  if(type==='day') filtered=allRsvps.filter(r=>r.guest_type==='day');
  else if(type==='evening') filtered=allRsvps.filter(r=>r.guest_type==='evening');
  else if(type==='attending') filtered=allRsvps.filter(r=>r.attending==='yes');
  else if(type==='declined') filtered=allRsvps.filter(r=>r.attending==='no');
  renderTable(filtered);
}

function exportCSV(){
  if(!allRsvps.length){alert('No data to export.');return;}
  const headers=['Name','Type','Attending','Dietary','Allergies','Song Request','Day Two','Note','Submitted'];
  const rows=allRsvps.map(r=>[
    r.name||'',r.guest_type||'',r.attending||'',r.dietary||'',
    r.allergies||'',r.song_request||'',r.day_two||'',
    (r.note_to_couple||'').replace(/,/g,';'),
    new Date(r.created_at).toLocaleDateString('en-GB')
  ]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='callum-livvy-rsvps.csv';
  a.click();
}
</script>
</body>
</html>
